<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Edwins | Semester Smart Timetable Sync</title>
    
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    </script>

    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #10b981;
            --secondary-hover: #059669;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --dark-header: #020617;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .site-header {
            background-color: var(--dark-header);
            border-bottom: 1px solid var(--border);
            color: #ffffff;
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .site-logo {
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            color: #ffffff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .site-logo::before { content: "⚡"; }
        .header-tag { font-size: 0.95rem; background: rgba(255,255,255,0.1); padding: 0.35rem 0.85rem; border-radius: 1rem; color: #cbd5e1; }

        .main-content {
            flex: 1;
            width: 100%;
            max-width: 56rem;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            box-sizing: border-box;
        }
        
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }

        h2 { font-size: 1.5rem; margin-top: 0; margin-bottom: 1.25rem; border-bottom: 2px solid var(--border); padding-bottom: 0.5rem; }

        .upload-wrapper {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        @media (min-width: 640px) { .upload-wrapper { flex-direction: row; align-items: center; } }

        .file-input-custom {
            flex-grow: 1;
            padding: 0.75rem;
            border: 2px dashed var(--border);
            border-radius: 0.5rem;
            background-color: var(--dark-header);
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .event-row {
            background: var(--dark-header);
            padding: 1.5rem;
            border-radius: 0.75rem;
            margin-bottom: 1.25rem;
            position: relative;
            border-left: 5px solid var(--primary);
            border-top: 1px solid var(--border);
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .remove-btn {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            background: var(--danger);
            color: white;
            padding: 0.35rem 0.7rem;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 0.375rem;
            border: none;
            cursor: pointer;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr; gap: 1.25rem; }
        @media (min-width: 640px) { .grid-2 { grid-template-columns: 1fr 1fr; } }
        
        .grid-3 { display: grid; grid-template-columns: 1fr; gap: 1.25rem; }
        @media (min-width: 640px) { .grid-3 { grid-template-columns: 1fr 1fr 1fr; } }

        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; color: #cbd5e1; }
        
        input[type="text"], input[type="date"], input[type="time"], select {
            width: 100%; 
            padding: 0.75rem; 
            border: 1px solid var(--border); 
            border-radius: 0.5rem; 
            box-sizing: border-box; 
            background: var(--bg-card);
            color: white;
            font-size: 1.1rem;
        }
        input:focus, select:focus { border-color: var(--primary); outline: none; }

        button { cursor: pointer; padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: 600; border: none; font-size: 1.1rem; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        @media (min-width: 640px) { .btn-primary { width: auto; } }
        .btn-primary:hover { background: var(--primary-hover); }
        
        .btn-success { background: var(--secondary); color: white; width: 100%; padding: 1rem; font-size: 1.25rem; margin-top: 1rem; }
        .btn-success:hover { background: var(--secondary-hover); }
        
        .btn-secondary { background: #334155; color: white; margin-bottom: 1.5rem; width: 100%; }
        @media (min-width: 640px) { .btn-secondary { width: auto; } }
        
        #status { font-weight: 500; color: var(--primary); margin-top: 0.75rem; font-size: 1.1rem; }

        .site-footer { background-color: var(--dark-header); color: #94a3b8; padding: 2.5rem 1.5rem; border-top: 1px solid var(--border); font-size: 1rem; }
        .footer-container { max-width: 56rem; margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem; }
        .footer-top { display: flex; flex-direction: column; justify-content: space-between; align-items: center; gap: 1rem; }
        @media (min-width: 640px) { .footer-top { flex-direction: row; } }
        .footer-meta a { color: #38bdf8; text-decoration: none; font-weight: 600; }
        .sponsors-section { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; }
        .sponsor-badge { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; padding: 0.5rem 1rem; background: var(--bg-card); border-radius: 0.375rem; border: 1px solid var(--border); color: #cbd5e1; }
        .footer-bottom { text-align: center; font-size: 0.9rem; color: #64748b; margin-top: 1rem; }
    </style>
</head>
<body>

    <header class="site-header">
        <a href="#" class="site-logo">The Edwins</a>
        <div class="header-tag">Scheduler v4.0</div>
    </header>

    <main class="main-content">
        <div class="card">
            <h2>📅 Active Semester Window</h2>
            <div class="grid-2">
                <div class="form-group">
                    <label>Semester Start Date</label>
                    <input type="date" id="semesterStart" required>
                </div>
                <div class="form-group">
                    <label>Semester End Date</label>
                    <input type="date" id="semesterEnd" required>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>✨ Drop or Select Timetable</h2>
            <form id="uploadForm">
                <div class="upload-wrapper">
                    <input type="file" id="timetableFile" class="file-input-custom" accept=".pdf,.png,.jpg,.jpeg" required>
                    <button type="submit" id="processBtn" class="btn-primary">Auto-Extract Rows</button>
                </div>
                <div id="status"></div>
            </form>
        </div>

        <div class="card">
            <h2>✍️ Verified Semester Tracks</h2>
            <form id="masterEventForm">
                <div id="eventsContainer"></div>
                <button type="button" class="button btn-secondary" id="addEventBtn">＋ Add Manual Session Row</button>
                <button type="submit" class="btn-success">⚡ Multi-Sync All Slots to Google</button>
            </form>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-container">
            <div class="footer-top">
                <div class="footer-meta">
                    <strong>Technical Support:</strong> <a href="mailto:iatechnologies45@gmail.com">iatechnologies45@gmail.com</a>
                </div>
                <div class="sponsors-section">
                    <span class="sponsor-badge">No room for racism</span>
                    <span class="sponsor-badge">Apple Link</span>
                </div>
            </div>
            <div class="footer-bottom">&copy; 2026 The Edwins. All rights reserved.</div>
        </div>
    </footer>

    <script>
        const eventsContainer = document.getElementById('eventsContainer');
        const addEventBtn = document.getElementById('addEventBtn');
        const uploadForm = document.getElementById('uploadForm');
        const processBtn = document.getElementById('processBtn');
        const statusDiv = document.getElementById('status');

        const currentYear = new Date().getFullYear();
        document.getElementById('semesterStart').value = `${currentYear}-01-05`;
        document.getElementById('semesterEnd').value = `${currentYear}-06-30`;

        let eventCounter = 0;
        const daysArray = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];

        function createEventRow(initialData = {}) {
            eventCounter++;
            const rowIndex = eventCounter;
            let optionsHtml = daysArray.map(d => `<option value="${d}" ${initialData.day === d ? 'selected' : ''}>${d}</option>`).join('');

            const eventHtml = `
                <div class="event-row" id="row-${rowIndex}">
                    <button type="button" class="remove-btn" onclick="document.getElementById('row-${rowIndex}').remove()">Remove</button>
                    <div class="grid-3">
                        <div class="form-group">
                            <label>Course Name / Module</label>
                            <input type="text" class="field-title" required value="${initialData.title || ''}">
                        </div>
                        <div class="form-group">
                            <label>Venue / Room</label>
                            <input type="text" class="field-location" required value="${initialData.location || ''}">
                        </div>
                        <div class="form-group">
                            <label>Day of Week</label>
                            <select class="field-day">${optionsHtml}</select>
                        </div>
                    </div>
                    <div class="grid-2">
                        <div class="form-group">
                            <label>Start Time</label>
                            <input type="time" class="field-startTime" value="${initialData.startTime || '08:00'}" required>
                        </div>
                        <div class="form-group">
                            <label>End Time</label>
                            <input type="time" class="field-endTime" value="${initialData.endTime || '10:00'}" required>
                        </div>
                    </div>
                </div>
            `;
            eventsContainer.insertAdjacentHTML('beforeend', eventHtml);
        }

        // Auto-load your actual IAA MIS schedule straight on initialization to save time
        const initiallAASchedule = [
            { title: "Security in Emerging Technologies", start: "08:10", end: "10:20", room: "PGB 10", day: "Monday" },
            { title: "Ethical Hacking", start: "08:10", end: "10:20", room: "LIB NO: 25", day: "Tuesday" },
            { title: "ICT Project Management", start: "08:10", end: "10:20", room: "LIB NO: 26", day: "Wednesday" },
            { title: "Biometrics", start: "08:10", end: "12:40", room: "PGB 2", day: "Thursday" },
            { title: "Digital Forensics", start: "11:40", end: "13:50", room: "PGB 9", day: "Friday" }
        ];
        initiallAASchedule.forEach(slot => createEventRow({title: slot.title, location: slot.room, day: slot.day, startTime: slot.start, endTime: slot.end}));

        addEventBtn.addEventListener('click', () => createEventRow({day: "Monday"}));

        function getNextInitialDateForDay(startDateStr, targetDayName) {
            const start = new Date(startDateStr);
            const targetIndex = daysArray.indexOf(targetDayName); 
            const startIndex = start.getDay() === 0 ? 6 : start.getDay() - 1; 
            let difference = targetIndex - startIndex;
            if (difference < 0) difference += 7;
            start.setDate(start.getDate() + difference);
            return start.toISOString().split('T')[0];
        }

        document.getElementById('masterEventForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const rows = document.querySelectorAll('.event-row');
            const semStart = document.getElementById('semesterStart').value;
            const semEnd = document.getElementById('semesterEnd').value;

            if (rows.length === 0) return;

            const dayFlags = ["MO", "TU", "WE", "TH", "FR", "SA", "SU"];

            // Loops over every row item and pops up Google Calendar tab slots sequentially for the whole semester block
            rows.forEach((row, index) => {
                setTimeout(() => {
                    const title = encodeURIComponent(row.querySelector('.field-title').value);
                    const location = encodeURIComponent(row.querySelector('.field-location').value);
                    const dayName = row.querySelector('.field-day').value;
                    const startTime = row.querySelector('.field-startTime').value;
                    const endTime = row.querySelector('.field-endTime').value;

                    const compDate = getNextInitialDateForDay(semStart, dayName).replace(/-/g, '');
                    const timeBlock = `${compDate}T${startTime.replace(/:/g, '')}00/${compDate}T${endTime.replace(/:/g, '')}00`;
                    const recurRule = `FREQ=WEEKLY;UNTIL=${semEnd.replace(/-/g, '')}T235959Z;BYDAY=${dayFlags[daysArray.indexOf(dayName)]}`;

                    const googleLink = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${timeBlock}&details=Synced+via+The+Edwins&location=${location}&recur=RRULE:${recurRule}`;
                    window.open(googleLink, '_blank');
                }, index * 400); // 400ms interval to prevent popup browser blockers
            });

            statusDiv.innerHTML = `<div style="padding:1rem; background:#065f46; border-radius:0.5rem; text-align:center;">🚀 Google Calendar sequences triggered successfully! Click save on each tab.</div>`;
        });
    </script>
</body>
</html>
